<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Member Login | HSMV Foundation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI",sans-serif;background:#f5f0e8;min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1209,#2d1f05);padding:20px;}
.login-card{background:#fff;border-radius:12px;padding:30px 26px;width:100%;max-width:350px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.lc-logo{text-align:center;margin-bottom:18px;}
.lc-logo img{width:58px;height:58px;border-radius:50%;border:3px solid #E8A020;}
.lc-logo h2{font-family:Georgia,serif;font-size:1.08rem;color:#1a1209;margin-top:7px;}
.lc-logo p{font-size:0.72rem;color:#8a7455;margin-top:3px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:0.67rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8a7455;margin-bottom:4px;}
.fg input{width:100%;padding:10px 12px;border:1.5px solid #e0d0b0;border-radius:6px;font-size:0.86rem;outline:none;transition:.3s;background:#fffdf7;}
.fg input:focus{border-color:#E8A020;}
.btn-login{width:100%;padding:11px;background:#E8A020;color:#1a1209;border:none;border-radius:6px;font-weight:700;font-size:0.88rem;cursor:pointer;transition:.3s;margin-top:3px;}
.btn-login:hover{background:#f0b030;}
.btn-login:disabled{background:#ddd;color:#999;cursor:not-allowed;}
.login-err{color:#dc3545;font-size:0.72rem;text-align:center;margin-top:8px;padding:7px;background:#fff5f5;border-radius:4px;border:1px solid #f5c6cb;display:none;}
.back-link{text-align:center;margin-top:12px;font-size:0.73rem;}
.back-link a{color:#E8A020;text-decoration:none;}
.dash-wrap{display:none;min-height:100vh;background:#f5f0e8;}
.topbar{background:#1a1209;padding:11px 5%;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #E8A020;position:sticky;top:0;z-index:50;}
.tb-left{display:flex;align-items:center;gap:9px;}
.tb-logo{width:36px;height:36px;border-radius:50%;border:2px solid #E8A020;object-fit:cover;}
.tb-title{color:#fff;font-size:0.82rem;font-weight:600;line-height:1.3;}
.tb-title small{display:block;color:#E8A020;font-size:0.56rem;letter-spacing:2px;text-transform:uppercase;}
.member-av{width:34px;height:34px;border-radius:50%;border:2px solid #E8A020;object-fit:cover;}
.btn-logout{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:5px 11px;border-radius:4px;font-size:0.7rem;cursor:pointer;}
.content{max-width:760px;margin:0 auto;padding:22px 14px 56px;}
.status-hero{border-radius:12px;padding:22px 18px;margin-bottom:18px;text-align:center;}
.sh-pending{background:linear-gradient(135deg,#856404,#6d5204);}
.sh-approved{background:linear-gradient(135deg,#1a4d24,#255c2e);}
.sh-rejected{background:linear-gradient(135deg,#842029,#6d1a21);}
.status-hero h2{color:#fff;font-family:Georgia,serif;font-size:1.15rem;margin-bottom:5px;}
.status-hero p{color:rgba(255,255,255,0.72);font-size:0.78rem;}
.status-icon{font-size:2.3rem;margin-bottom:9px;}
.mid-display{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:8px;padding:7px 18px;display:inline-block;margin-top:11px;color:#fff;font-weight:700;font-size:0.96rem;letter-spacing:2px;}
.profile-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 11px rgba(0,0,0,0.07);margin-bottom:14px;border-top:3px solid #E8A020;}
.profile-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px;}
.p-photo{width:76px;height:76px;border-radius:10px;object-fit:cover;border:3px solid #E8A020;flex-shrink:0;}
.p-info h3{font-family:Georgia,serif;font-size:0.96rem;color:#1a1209;margin-bottom:3px;}
.p-post{font-size:0.7rem;color:#E8A020;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:7px;}
.p-mid{background:#1a1209;color:#E8A020;padding:2px 9px;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:1px;display:inline-block;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ir{font-size:0.76rem;color:#2d2410;}
.ir span{display:block;font-size:0.62rem;color:#8a7455;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:1px;}
.docs-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 11px rgba(0,0,0,0.07);margin-bottom:14px;border-top:3px solid #3a7d44;}
.docs-card h3{font-family:Georgia,serif;font-size:0.92rem;color:#1a1209;margin-bottom:12px;}
.doc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.doc-item{border:1.5px solid #e0d0b0;border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:.3s;}
.doc-item:hover{border-color:#E8A020;background:#fffdf7;transform:translateY(-2px);}
.doc-icon{font-size:1.7rem;margin-bottom:7px;}
.doc-name{font-size:0.73rem;font-weight:700;color:#1a1209;}
.doc-desc{font-size:0.63rem;color:#8a7455;margin-top:2px;}
.btn-dl{background:#E8A020;color:#1a1209;border:none;padding:6px 12px;border-radius:5px;font-size:0.7rem;font-weight:700;cursor:pointer;margin-top:7px;width:100%;transition:.3s;}
.btn-dl:hover{background:#f0b030;}
.pending-note{text-align:center;padding:28px 18px;background:#fff8ee;border-radius:10px;border:1px dashed #E8A020;}
.pending-note p{font-size:0.8rem;color:#8a7455;line-height:1.7;}
@media(max-width:520px){.doc-grid{grid-template-columns:1fr 1fr;}.info-grid{grid-template-columns:1fr;}}
</style>
</head>

var SHEET_URL = "https://script.google.com/macros/s/AKfycbzeuxIZmhTKTsh3uKaXGo9fgqWCtQYMANOmFHugYPQn1wnMod8GFRGWeQgLoDIgrC7Y/exec";
var memberData = null;

var savedMID = localStorage.getItem("hsmv_mid");
if(savedMID) document.getElementById("l_mid").value = savedMID;

function doLogin(){
  var mid = document.getElementById("l_mid").value.trim().toUpperCase();
  var pass = document.getElementById("l_pass").value;
  var btn = document.getElementById("loginBtn");
  var err = document.getElementById("loginErr");
  err.style.display = "none";
  if(!mid || !pass){
    err.textContent = "Member ID aur password required";
    err.style.display = "block";
    return;
  }
  btn.disabled = true;
  btn.textContent = "Logging in...";

  // Use GET - no CORS issue
  var url = SHEET_URL + "?action=login&memberId=" + encodeURIComponent(mid) + "&password=" + encodeURIComponent(btoa(pass));
  
  fetch(url)
  .then(function(r){ return r.json(); })
  .then(function(d){
    btn.disabled = false;
    btn.textContent = "Login";
    if(d.status !== "success"){
      err.textContent = d.message || "Login failed";
      err.style.display = "block";
      return;
    }
    memberData = d.member;
    memberData.id = mid;
    localStorage.setItem("hsmv_mid", mid);
    showDashboard();
  })
  .catch(function(e){
    btn.disabled = false;
    btn.textContent = "Login";
    err.textContent = "Connection error: " + e.message;
    err.style.display = "block";
  });
}

function doLogout(){memberData=null;document.getElementById("dashWrap").style.display="none";document.getElementById("loginWrap").style.display="flex";}

function showDashboard(){
  document.getElementById("loginWrap").style.display="none";
  document.getElementById("dashWrap").style.display="block";
  var m=memberData;
  var hero=document.getElementById("statusHero");
  if(m.memberStatus==="approved"){
    hero.className="status-hero sh-approved";
    document.getElementById("statusIcon").textContent="\u2705";
    document.getElementById("statusTitle").textContent="Welcome, "+m.name+"!";
    document.getElementById("statusDesc").textContent="Aap HSMV Foundation ke approved member hain.";
  }else if(m.memberStatus==="rejected"){
    hero.className="status-hero sh-rejected";
    document.getElementById("statusIcon").textContent="\u274C";
    document.getElementById("statusTitle").textContent="Application Rejected";
    document.getElementById("statusDesc").textContent="Admin se contact karein: +91 63927 60740";
  }else{
    hero.className="status-hero sh-pending";
    document.getElementById("statusIcon").textContent="\u23F3";
    document.getElementById("statusTitle").textContent="Application Under Review";
    document.getElementById("statusDesc").textContent="Thoda intezaar karein — admin review kar rahe hain.";
  }
  document.getElementById("midDisplay").textContent=m.memberId||m.id;
  if(m.photo){var pi=document.getElementById("p_photo");pi.src=m.photo;pi.style.display="block";document.getElementById("nav_photo").src=m.photo;document.getElementById("nav_photo").style.display="block";}
  document.getElementById("p_name").textContent=m.name||"-";

function getDate(){
  if(memberData&&memberData.approvedAt) return new Date(memberData.approvedAt).toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"});

}

function formatDate(d){
  if(!d) return "N/A";
  try{
    var dt = new Date(d);
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return (dt.getDate()<10?"0":"")+dt.getDate()+"-"+months[dt.getMonth()]+"-"+dt.getFullYear();
  }catch(e){return d;}
}

function getValidTo(fromDate){
  if(!fromDate) return "N/A";
  try{
    var d=new Date(fromDate);
    d.setFullYear(d.getFullYear()+1);
    d.setDate(d.getDate()-1);
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return (d.getDate()<10?"0":"")+d.getDate()+"-"+months[d.getMonth()]+"-"+d.getFullYear();
  }catch(e){return "N/A";}
}
